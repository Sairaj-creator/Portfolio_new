<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Portfolio of Sairaj Borkar, a full-stack developer and software engineer building AI-assisted web products."
    />
    <meta name="theme-color" content="#07080d" />
    <title>Sairaj Borkar | Full-Stack Developer</title>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Sairaj Borkar | Full-Stack Developer" />
    <meta
      property="og:description"
      content="Full-stack developer and software engineer building AI-assisted web products with React, Node.js, and Python."
    />
    <meta property="og:image" content="https://sairaj-portfolio.example.com/og-image.png" />
    <meta property="og:url" content="https://sairaj-portfolio.example.com/" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Sairaj Borkar | Full-Stack Developer" />
    <meta
      name="twitter:description"
      content="Full-stack developer and software engineer building AI-assisted web products with React, Node.js, and Python."
    />
    <meta name="twitter:image" content="https://sairaj-portfolio.example.com/og-image.png" />

    <!-- Non-blocking Google Fonts load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap"
      />
    </noscript>

    <!-- Structured data for search engines -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Sairaj Borkar",
        "jobTitle": "Full-Stack Developer",
        "url": "https://sairaj-portfolio.example.com/",
        "sameAs": [
          "https://github.com/Sairaj-creator",
          "https://www.linkedin.com/in/sairaj-borkar/"
        ],
        "alumniOf": {
          "@type": "CollegeOrUniversity",
          "name": "Canara Engineering College"
        },
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Mangaluru",
          "addressCountry": "IN"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
